project:
  type: website

execute:
  # Render `python` and other code blocks as static syntax-highlighted
  # text. The course pages use code blocks as illustrations, not runnable
  # cells; this avoids requiring jupyter / scanpy / etc. in the CI render
  # and is also what we want pedagogically (students read, then run the
  # code in Module notebooks themselves, not on the rendered website).
  enabled: false

website:
  page-navigation: true
  title: "AI Fluency Foundations for Biology"
  description: "A self-paced foundations course on using AI effectively in biological research — the 4 D's of AI fluency, LLM literacy, and a hands-on single-cell RNA-seq pipeline (FASTQ → annotated UMAP) run with AI in the loop. Plan on ~1 week per unit at ~3–5 hours; go faster or slower at your own pace."
  site-url: "https://mdmanurung.github.io/ai-fluency-for-bio/"

  repo-url: https://github.com/mdmanurung/ai-fluency-for-bio
  repo-actions: [edit, issue]

  open-graph: true

  page-footer:
    right: "Built with [Quarto](https://quarto.org/)."
    left: "&copy; 2026 · Licensed [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)."
    background: "#E8F1EE"

  sidebar:
    background: "#E8F1EE"
    pinned: true
    align: center
    tools:
      - icon: github
        href: https://github.com/mdmanurung/ai-fluency-for-bio
        text: "Course repository"

    style: "docked"
    search: true
    collapse-level: 1
    contents:
      - section: "Course information"
        contents:
          - href: index.qmd
            text: Roadmap
          - href: course-overview.qmd
            text: Overview
          - href: course-how-to-use.qmd
            text: How to use this course
          - href: course-syllabus.qmd
            text: Syllabus
          - href: course-support.qmd
            text: Support
          - href: course-team.qmd
            text: About the author
          - href: course-faq.qmd
            text: FAQ
      - section: "Week 1 — AI fluency foundations"
        contents:
          - href: weeks/week-1.qmd
            text: "Week 1 path"
          - href: fluency/delegation.qmd
            text: "Reading: Delegation"
          - href: fluency/description.qmd
            text: "Reading: Description"
          - href: fluency/discernment.qmd
            text: "Reading: Discernment"
          - href: fluency/diligence.qmd
            text: "Reading: Diligence"
      - section: "Week 2 — LLM literacy for bio"
        contents:
          - href: weeks/week-2.qmd
            text: "Week 2 path"
          - href: literacy/how-llms-work.qmd
            text: "Reading: How LLMs work"
          - href: literacy/prompting.qmd
            text: "Reading: Prompting"
          - href: literacy/tool-use-and-agents.qmd
            text: "Reading: Tool use & agents"
          - href: literacy/ethics-and-limits.qmd
            text: "Reading: Ethics & limits"
      - section: "Week 3 — scRNA-seq I (QC → clustering)"
        contents:
          - href: weeks/week-3.qmd
            text: "Week 3 path"
          - href: bioinformatics/code-assistance.qmd
            text: "Reading: Code assistance"
          - href: bioinformatics/data-analysis.qmd
            text: "Reading: Data analysis"
          - href: modules/module-01-raw-data-qc/README.md
            text: "Module 1 — Raw data QC"
          - href: modules/module-02-alignment-count-matrix/README.md
            text: "Module 2 — Alignment & count matrix"
          - href: modules/module-03-preprocessing-scanpy/README.md
            text: "Module 3 — Preprocessing in Scanpy"
          - href: modules/module-04-clustering-umap/README.md
