project:
  type: website

website:
  page-navigation: true
  title: "AI Fluency Foundations for Biology"
  description: "A 4-week foundations course on using AI effectively in biological research — the 4 D's of AI fluency, LLM literacy, and a hands-on single-cell RNA-seq pipeline (FASTQ → annotated UMAP) run with AI in the loop."
  site-url: "https://mdmanurung.github.io/ai-fluency-for-bio/"

  repo-url: https://github.com/mdmanurung/ai-fluency-for-bio
  repo-actions: [edit, issue]

  open-graph: true

  page-footer:
    right: "Built with [Quarto](https://quarto.org/)."
    left: "&copy; 2026 · Licensed [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)."
    background: "#E8F1EE"

  sidebar:
    background: "#E8F1EE"
    pinned: true
    align: center
    tools:
      - icon: github
        href: https://github.com/mdmanurung/ai-fluency-for-bio
        text: "Course repository"

    style: "docked"
    search: true
    collapse-level: 1
    contents:
      - section: "Course information"
        contents:
          - href: course-overview.qmd
            text: Overview
          - href: course-syllabus.qmd
            text: Syllabus
          - href: course-support.qmd
            text: Support
          - href: course-team.qmd
            text: Teaching team
          - href: index.qmd
            text: Schedule
          - href: course-faq.qmd
            text: FAQ
      - section: "AI fluency: the 4 D's"
