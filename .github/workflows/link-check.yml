name: Link check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Monday 06:00 UTC — catches link rot without blocking day-to-day PRs
    - cron: "0 6 * * 1"

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 10
            --timeout 30
            --max-concurrency 4
            --accept 200,206,403,429
            --exclude-mail
            './**/*.qmd'
            './**/*.md'
            './**/*.ipynb'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
